<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>値引写真判定テスト</title>
  <style>
    :root {
      color-scheme: light;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    body {
      margin: 0;
      background: #f6f7f9;
      color: #1f1f1f;
    }
    main {
      max-width: 720px;
      margin: 0 auto;
      padding: 18px;
    }
    h1 {
      font-size: 22px;
      margin: 0 0 14px;
    }
    section {
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 14px;
      padding: 16px;
      margin-bottom: 14px;
    }
    label {
      display: block;
      font-weight: 800;
      margin-bottom: 6px;
    }
    select, input[type="file"] {
      width: 100%;
      box-sizing: border-box;
      padding: 12px;
      border-radius: 10px;
      border: 1px solid #ccc;
      background: #fff;
      font-size: 16px;
    }
    .grid {
      display: grid;
      gap: 12px;
    }
    .row {
      display: grid;
      gap: 12px;
      grid-template-columns: repeat(3, 1fr);
    }
    @media (max-width: 640px) {
      .row {
        grid-template-columns: 1fr;
      }
    }
    button {
      border: 1px solid #bbb;
      background: #fff;
      border-radius: 12px;
      padding: 12px 14px;
      font-weight: 800;
      font-size: 16px;
      cursor: pointer;
    }
    button.primary {
      background: #1f57d6;
      border-color: #1f57d6;
      color: #fff;
      width: 100%;
    }
    button:disabled {
      opacity: .55;
      cursor: not-allowed;
    }
    .result {
      line-height: 1.7;
    }
    .judge {
      font-size: 24px;
      font-weight: 900;
      margin-bottom: 4px;
    }
    .muted {
      color: #555;
      font-size: 14px;
    }
    .preview {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
      gap: 8px;
      margin-top: 10px;
    }
    .preview img {
      width: 100%;
      aspect-ratio: 1 / 1;
      object-fit: cover;
      border-radius: 10px;
      border: 1px solid #ddd;
      background: #fafafa;
    }
    .feedback {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-top: 12px;
    }
    @media (max-width: 480px) {
      .feedback {
        grid-template-columns: 1fr;
      }
    }
    .error {
      color: #b00020;
      font-weight: 700;
      white-space: pre-wrap;
    }
    .ok {
      color: #0a6d2c;
      font-weight: 700;
    }
    ul {
      margin: 6px 0 0;
      padding-left: 20px;
    }
  </style>
</head>
<body>
  <main>
    <h1>値引写真判定テスト</h1>

    <section>
      <div class="grid">
        <div class="row">
          <div>
            <label for="area">エリア</label>
            <select id="area"></select>
          </div>
          <div>
            <label for="weekday">曜日</label>
            <select id="weekday"></select>
          </div>
          <div>
            <label for="discountTime">時刻</label>
            <select id="discountTime"></select>
          </div>
        </div>

        <div>
          <label for="photos">写真</label>
          <input id="photos" type="file" accept="image/*" capture="environment" multiple />
          <div class="muted">曲がっている売場は複数枚選んでください。写真なしなら判定しません。</div>
          <div id="preview" class="preview"></div>
        </div>

        <button id="judgeButton" class="primary">参考判定を見る</button>
      </div>
    </section>

    <section id="resultSection" hidden>
      <div id="result" class="result"></div>
      <div id="feedback" class="feedback" hidden>
        <button data-judge="多い">多いとして保存</button>
        <button data-judge="どちらでもない">どちらでもないとして保存</button>
        <button data-judge="少ない">少ないとして保存</button>
      </div>
      <div id="saveStatus"></div>
    </section>

    <section>
      <div style="font-weight:900;margin-bottom:6px;">最近の保存</div>
      <div id="recent" class="muted">読み込み中...</div>
    </section>
  </main>

  <script>
    const AREAS = [
      "弁当・麺類",
      "天ぷら",
      "コロッケ系",
      "フライ・鶏惣菜",
      "焼鳥",
      "中華・魚惣菜",
      "バランス弁当",
      "赤飯・炊き込みご飯",
      "おにぎり",
      "寿司",
      "太巻・中巻",
      "いなり",
      "細巻き",
    ];
    const WEEKDAYS = ["日曜日", "月曜日", "火曜日", "水曜日", "木曜日", "金曜日", "土曜日"];
    const TIMES = ["15時", "17時", "18時半", "19時半", "20時半"];

    const areaEl = document.querySelector("#area");
    const weekdayEl = document.querySelector("#weekday");
    const timeEl = document.querySelector("#discountTime");
    const photosEl = document.querySelector("#photos");
    const previewEl = document.querySelector("#preview");
    const judgeButton = document.querySelector("#judgeButton");
    const resultSection = document.querySelector("#resultSection");
    const resultEl = document.querySelector("#result");
    const feedbackEl = document.querySelector("#feedback");
    const saveStatusEl = document.querySelector("#saveStatus");
    const recentEl = document.querySelector("#recent");

    let currentPhotoGroupId = null;

    function fillSelect(el, values) {
      el.innerHTML = "";
      for (const value of values) {
        const option = document.createElement("option");
        option.value = value;
        option.textContent = value;
        el.appendChild(option);
      }
    }

    fillSelect(areaEl, AREAS);
    fillSelect(weekdayEl, WEEKDAYS);
    fillSelect(timeEl, TIMES);
    weekdayEl.value = WEEKDAYS[new Date().getDay()];

    photosEl.addEventListener("change", () => {
      previewEl.innerHTML = "";
      for (const file of photosEl.files) {
        const img = document.createElement("img");
        img.alt = file.name;
        img.src = URL.createObjectURL(file);
        previewEl.appendChild(img);
      }
    });

    judgeButton.addEventListener("click", async () => {
      const files = Array.from(photosEl.files || []);
      if (files.length === 0) {
        alert("写真を1枚以上選んでください。");
        return;
      }

      judgeButton.disabled = true;
      judgeButton.textContent = "判定中...";
      resultSection.hidden = false;
      resultEl.innerHTML = "<div class='muted'>判定中...</div>";
      feedbackEl.hidden = true;
      saveStatusEl.textContent = "";
      currentPhotoGroupId = null;

      try {
        const form = new FormData();
        form.append("area", areaEl.value);
        form.append("weekday", weekdayEl.value);
        form.append("discountTime", timeEl.value);
        for (const file of files) {
          form.append("photos", file);
        }

        const response = await fetch("/api/judge", { method: "POST", body: form });
        const data = await response.json();
        if (!response.ok) throw new Error(data.error || "判定に失敗しました。");

        currentPhotoGroupId = data.photoGroupId;
        const suggestion = data.suggestion || "判定なし";
        const reasonItems = (data.reason || []).map((line) => `<li>${escapeHtml(line)}</li>`).join("");
        const examples = (data.examples || []).length
          ? `<div class="muted">比較に使った過去例: ${data.examples.length}件</div>`
          : `<div class="muted">比較に使える過去例はまだありません。</div>`;

        resultEl.innerHTML = `
          <div class="judge">参考判定：${escapeHtml(suggestion)}</div>
          <div>自信度：${escapeHtml(data.confidence || "低")}</div>
          <div style="font-weight:800;margin-top:8px;">理由</div>
          <ul>${reasonItems}</ul>
          ${examples}
        `;
        feedbackEl.hidden = false;
      } catch (error) {
        resultEl.innerHTML = `<div class="error">${escapeHtml(error.message)}</div>`;
      } finally {
        judgeButton.disabled = false;
        judgeButton.textContent = "参考判定を見る";
        await loadRecent();
      }
    });

    feedbackEl.addEventListener("click", async (event) => {
      const button = event.target.closest("button[data-judge]");
      if (!button || !currentPhotoGroupId) return;

      const humanJudge = button.dataset.judge;
      saveStatusEl.innerHTML = "<div class='muted'>保存中...</div>";
      for (const btn of feedbackEl.querySelectorAll("button")) btn.disabled = true;

      try {
        const response = await fetch("/api/feedback", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ photoGroupId: currentPhotoGroupId, humanJudge }),
        });
        const data = await response.json();
        if (!response.ok) throw new Error(data.error || "保存に失敗しました。");
        saveStatusEl.innerHTML = `<p class="ok">人間の最終判定「${escapeHtml(humanJudge)}」を保存しました。</p>`;
        await loadRecent();
      } catch (error) {
        saveStatusEl.innerHTML = `<p class="error">${escapeHtml(error.message)}</p>`;
      } finally {
        for (const btn of feedbackEl.querySelectorAll("button")) btn.disabled = false;
      }
    });

    async function loadRecent() {
      try {
        const response = await fetch("/api/recent");
        const data = await response.json();
        if (!data.groups?.length) {
          recentEl.textContent = "まだ保存履歴はありません。";
          return;
        }
        recentEl.innerHTML = data.groups
          .map((group) => {
            const human = group.humanJudge ? `人間:${group.humanJudge}` : "人間:未保存";
            const ai = group.aiJudge ? `AI:${group.aiJudge}` : "AI:なし";
            const feedback = group.feedbackText ? ` / ${group.feedbackText}` : "";
            return `<div>${escapeHtml(group.area)} / ${escapeHtml(group.weekday)} / ${escapeHtml(group.discountTime)} / ${ai} / ${human}${escapeHtml(feedback)} / 写真${group.photoCount}枚</div>`;
          })
          .join("");
      } catch {
        recentEl.textContent = "最近の保存を読み込めませんでした。";
      }
    }

    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    loadRecent();
  </script>
</body>
</html>
